name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # corepack reads the packageManager field in package.json and
      # provisions the exact pinned Yarn version.
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # --immutable fails if yarn.lock would change — reproducible builds.
      - run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      # Catches type errors in test files, which `next build` doesn't compile.
      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test:run

      - name: Build
        run: yarn build

  # E2e tests run against the built static export in a real browser.
  # PR-only by design: they gate merges, and main re-running them on the
  # identical merged commit would add minutes without adding signal.
  e2e:
    name: End-to-end tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Build and run e2e tests
        run: yarn e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
