name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # corepack reads the packageManager field in package.json and
      # provisions the exact pinned Yarn version.
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # --immutable fails if yarn.lock would change — reproducible builds.
      - run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      # Catches type errors in test files, which `next build` doesn't compile.
      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test:run

      - name: Build
        run: yarn build
