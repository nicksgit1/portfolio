name: Deploy to GitHub Pages

on:
  # Deploy only after CI has passed on main. Branch protection gates
  # PRs, but deploying on raw push would race CI (or ship an admin
  # push that skipped it) — a red main must never reach Pages.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # workflow_dispatch carries no workflow_run payload — treat it as a
    # deliberate manual override; otherwise require the CI run to be green.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy the exact commit CI validated, not whatever main has
          # moved to since the run was queued.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      - name: Build static site
        run: yarn build
        env:
          # Project sites are served from /<repo-name>/.
          NEXT_PUBLIC_BASE_PATH: /portfolio

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
